name: Deploy to Cloudflare Pages

# Auto-deploys the site to the "imurfavceo" Cloudflare Pages project on every
# push to main (mirrors how Vercel used to deploy). Manual runs via the
# "Run workflow" button are also supported.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site (exclude VCS / dotfiles from the upload)
        run: |
          mkdir -p _site
          rsync -a --exclude='.*' --exclude='_site' ./ _site/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 57a28ebbbbeeaab2e91443b4a37fcb82
          command: pages deploy _site --project-name=imurfavceo --branch=main --commit-dirty=true
